name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  ORT_STRATEGY: download

jobs:
  # ── Lint: fmt + clippy (falla rápido sin compilar todo) ──────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest   # Linux es más rápido que windows para lint puro
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: "27.x"

      - name: Cache (rust-cache)
        uses: Swatinem/rust-cache@v2
        with:
          # Caches separados por job para no mezclar perfiles
          prefix-key: "lint"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Tests (solo en Windows porque la suite asume rutas Windows) ──────────
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: "27.x"

      - name: Cache (rust-cache)
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "test"

      # cargo test ya compila — no hace falta un `cargo build` previo
      - name: Run tests
        run: cargo test --workspace --exclude void-stack-desktop