name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.23.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            archive: tar.gz

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: "27.x"

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      - name: Build CLI (with vector search)
        run: cargo build --release --target ${{ matrix.target }} -p void-stack-cli --features vector

      - name: Build TUI (with vector search)
        run: cargo build --release --target ${{ matrix.target }} -p void-stack-tui --features vector

      - name: Build MCP (vector included via Cargo.toml)
        run: cargo build --release --target ${{ matrix.target }} -p void-stack-mcp

      - name: Build Daemon
        run: cargo build --release --target ${{ matrix.target }} -p void-stack-daemon

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          DIR="void-stack-${TAG}-${{ matrix.target }}"
          mkdir "$DIR"
          for bin in void void-stack-tui void-stack-daemon void-stack-mcp; do
            cp "target/${{ matrix.target }}/release/${bin}.exe" "$DIR/" 2>/dev/null || true
          done
          cp LICENSE README.md "$DIR/"
          7z a "${DIR}.zip" "$DIR"
          echo "ASSET=${DIR}.zip" >> $GITHUB_ENV

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          DIR="void-stack-${TAG}-${{ matrix.target }}"
          mkdir "$DIR"
          for bin in void void-stack-tui void-stack-daemon void-stack-mcp; do
            cp "target/${{ matrix.target }}/release/${bin}" "$DIR/" 2>/dev/null || true
          done
          cp LICENSE README.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"
          echo "ASSET=${DIR}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: void-stack-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Desktop builds (Tauri) ──
  build-desktop:
    name: Desktop ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: "27.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install frontend dependencies
        working-directory: crates/void-stack-desktop/frontend
        run: npm ci

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-desktop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-desktop-

      - name: Build desktop app
        working-directory: crates/void-stack-desktop
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload desktop artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: void-stack-desktop-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe

      - name: Upload desktop artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v6
        with:
          name: void-stack-desktop-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload desktop artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: void-stack-desktop-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

  release:
    name: Create Release
    needs: [build, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: Void Stack ${{ steps.tag.outputs.TAG }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
