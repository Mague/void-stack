name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.25.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ORT_STRATEGY: download

jobs:
  # ── CLI / TUI / MCP / Daemon ─────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          EXPECTED="${TAG#v}"
          CARGO_VER=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAURI_VER=$(grep '"version"' crates/void-stack-desktop/tauri.conf.json | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "Tag: $EXPECTED | Cargo.toml: $CARGO_VER | tauri.conf.json: $TAURI_VER"
          if [ "$CARGO_VER" != "$EXPECTED" ] || [ "$TAURI_VER" != "$EXPECTED" ]; then
            echo "::error::Version mismatch! Run: ./scripts/bump-version.sh $EXPECTED"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: "27.x"

      - name: Cache (rust-cache)
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "release-${{ matrix.target }}"

      # Un solo cargo build compila las dependencias compartidas una única vez
      - name: Build all binaries
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 45
          max_attempts: 3
          retry_wait_seconds: 30
          command: >
            cargo build --release --target ${{ matrix.target }}
            -p void-stack-cli
            -p void-stack-tui
            -p void-stack-mcp
            -p void-stack-daemon

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          DIR="void-stack-${TAG}-${{ matrix.target }}"
          mkdir "$DIR"
          for bin in void void-stack-tui void-stack-daemon void-stack-mcp; do
            cp "target/${{ matrix.target }}/release/${bin}.exe" "$DIR/" 2>/dev/null || true
          done
          cp LICENSE README.md "$DIR/"
          7z a "${DIR}.zip" "$DIR"
          echo "ASSET=${DIR}.zip" >> $GITHUB_ENV

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          DIR="void-stack-${TAG}-${{ matrix.target }}"
          mkdir "$DIR"
          for bin in void void-stack-tui void-stack-daemon void-stack-mcp; do
            cp "target/${{ matrix.target }}/release/${bin}" "$DIR/" 2>/dev/null || true
          done
          cp LICENSE README.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"
          echo "ASSET=${DIR}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: void-stack-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Desktop (Tauri) ───────────────────────────────────────────────────────
  build-desktop:
    name: Desktop ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          EXPECTED="${TAG#v}"
          CARGO_VER=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAURI_VER=$(grep '"version"' crates/void-stack-desktop/tauri.conf.json | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "Tag: $EXPECTED | Cargo.toml: $CARGO_VER | tauri.conf.json: $TAURI_VER"
          if [ "$CARGO_VER" != "$EXPECTED" ] || [ "$TAURI_VER" != "$EXPECTED" ]; then
            echo "::error::Version mismatch! Run: ./scripts/bump-version.sh $EXPECTED"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: "27.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: crates/void-stack-desktop/frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # cargo-binstall descarga el binario precompilado en ~5s en lugar de
      # compilar tauri-cli desde cero (~5-10 min)
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI (binario precompilado)
        run: cargo binstall tauri-cli --version "^2" --no-confirm

      - name: Cache (rust-cache)
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "desktop-${{ matrix.target }}"

      - name: Install frontend dependencies
        working-directory: crates/void-stack-desktop/frontend
        run: npm ci

      - name: Build desktop app
        working-directory: crates/void-stack-desktop
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload desktop artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: void-stack-desktop-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe

      - name: Upload desktop artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: void-stack-desktop-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload desktop artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: void-stack-desktop-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: Void Stack ${{ steps.tag.outputs.TAG }}
          generate_release_notes: true
          # Los scripts de instalación se suben junto con los binarios
          # para que sean accesibles desde la página de releases
          files: |
            artifacts/**/*
            scripts/install.sh
            scripts/install.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}